<nav
	class="w-full max-w-4xl mx-auto px-6 py-6 flex justify-between items-center border-b border-gray-200/20 dark:border-white/10"
	aria-label="Primary"
>
	<a
		href="{{ url_for('index') }}"
		class="text-xl font-bold tracking-tight hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
		>ollayor</a
	>
	<ul class="flex items-center gap-6 text-sm">
		<li>
			<a
				href="{{ url_for('blog') }}"
				class="{% if request.endpoint == 'blog' or request.endpoint == 'article' or request.endpoint == 'api_articles' %}text-gray-900 dark:text-gray-100 font-medium{% else %}text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 transition-colors{% endif %}"
				{% if request.endpoint in ['blog', 'article', 'api_articles'] %}aria-current="page"{% endif %}
				>Essays</a
			>
		</li>
		<li>
			<a
				href="{{ url_for('projects') }}"
				class="{% if request.endpoint == 'projects' %}text-gray-900 dark:text-gray-100 font-medium{% else %}text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 transition-colors{% endif %}"
				{% if request.endpoint == 'projects' %}aria-current="page"{% endif %}
				>Projects</a
			>
		</li>
		<li>
			<a
				href="{{ url_for('static', filename='media/Olloyor_s_resume.pdf') }}"
				target="_blank"
				rel="noopener"
				class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 transition-colors"
				>CV</a
			>
		</li>
		<li class="flex items-center">
			<button
				id="theme-toggle"
				type="button"
				aria-label="Toggle dark mode"
				class="relative w-8 h-8 rounded-full flex items-center justify-center text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 hover:bg-gray-200/50 dark:hover:bg-white/10 transition-colors"
			>
				<!-- Sun (shown in dark mode) -->
				<svg
					class="theme-icon-sun absolute w-[18px] h-[18px]"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<circle cx="12" cy="12" r="4" />
					<path
						d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
					/>
				</svg>
				<!-- Moon (shown in light mode) -->
				<svg
					class="theme-icon-moon absolute w-[18px] h-[18px]"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
				</svg>
			</button>
		</li>
	</ul>
</nav>

<style>
	#theme-toggle svg {
		transition:
			transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
			opacity 0.25s ease;
	}
	#theme-toggle .theme-icon-sun {
		opacity: 0;
		transform: rotate(90deg) scale(0.4);
	}
	#theme-toggle .theme-icon-moon {
		opacity: 1;
		transform: rotate(0) scale(1);
	}
	.dark #theme-toggle .theme-icon-sun {
		opacity: 1;
		transform: rotate(0) scale(1);
	}
	.dark #theme-toggle .theme-icon-moon {
		opacity: 0;
		transform: rotate(-90deg) scale(0.4);
	}
	#theme-toggle:active svg {
		transform: scale(0.85);
	}
</style>

<script>
	(function () {
		var btn = document.getElementById('theme-toggle');
		if (!btn) return;
		btn.addEventListener('click', function () {
			var isDark = document.documentElement.classList.toggle('dark');
			try {
				localStorage.theme = isDark ? 'dark' : 'light';
			} catch (e) {}
		});
	})();
</script>
